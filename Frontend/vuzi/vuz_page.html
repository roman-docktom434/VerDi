<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВерДи — Кабинет ВУЗа</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="assets/js/script.js" defer></script>
</head>
<body>

    <header class="header">
        <div class="container header__content">
            <h1 class="logo">ВерДи</h1>
            
            <nav class="header__nav">
                <a href="vuz_page.html" class="nav-link active">Список дипломов</a>
                <a href="add_student.html" class="nav-link">Добавить студента</a>
            </nav>

            <div class="user-info">
                <span class="user-info__name">Название ВУЗа</span>
                <div class="user-info__avatar">
                    <img src="assets/images/profile.png" alt="Профиль">
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="stats">
            <div class="stats__card">
                <span class="stats__number">1000</span>
                <span class="stats__label">дипломов</span>
            </div>
            <div class="stats__card">
                <span class="stats__number">100</span>
                <span class="stats__label">верифицировано</span>
            </div>
            <div class="stats__card">
                <span class="stats__number">50</span>
                <span class="stats__label">аннулировано</span>
            </div>
            <div class="stats__card">
                <span class="stats__number">0</span>
                <span class="stats__label">в очереди</span>
            </div>
        </section>

        <section class="upload-section">
            <h2 class="section-title">Загрузка реестра дипломов</h2>
            
            <form id="uploadForm">
                <div class="drop-zone" id="drop-zone">
                    
                    <div class="drop-zone__content" id="drop-zone-prompt">
                        <img src="assets/images/folder.png" alt="Загрузка" class="drop-zone__icon">
                        <p class="drop-zone__prompt">
                            Выберите файлы на компьютере или перетащите сюда
                        </p>
                    </div>

                    <div id="file-list" class="file-list"></div>
                    
                    <input type="file" id="file-input" accept=".csv, .xlsx, .xls" multiple hidden>
                    
                    <div class="upload-buttons">
                        <button type="button" class="btn-secondary" id="add-file-btn">
                            Добавить файл
                        </button>
                        <button type="submit" id="submit-to-registry" class="btn-primary" disabled>
                            Отправить в реестр
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="table-section">
            <h2 class="section-title">Список дипломов</h2>
            
            <div class="search-container">
                <img src="assets/images/Search.png" alt="Поиск" class="search-icon">
                <input type="text" id="searchInput" class="search-input" placeholder="Введите номер диплома">
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ФИО Студента</th>
                        <th>Специальность</th>
                        <th>№ Диплома</th>
                        <th>Дата выдачи (Год)</th>
                        <th>Статус</th>
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script>
        function updateUserName() {
            const name = localStorage.getItem('userName');
            const display = document.querySelector('.user-info__name');
            if (name && display) {
                display.textContent = name;
            }
        }

        async function loadDiploms() {
            try {
                // Проверь путь! Если в контроллере @RequestMapping("/api"), то путь такой:
                const response = await fetch('http://localhost:8080/api/diploms/all');

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }

                const diploms = await response.json();
                const tbody = document.querySelector('.data-table tbody');

                if (!tbody) {
                    console.error("Не найден элемент tbody в таблице .data-table");
                    return;
                }

                tbody.innerHTML = ''; // Очищаем статику

                diploms.forEach(d => {
                    const tr = document.createElement('tr');
                    const isCancelled = (d.cancelled === 1);
                    const statusText = isCancelled ? 'Аннулирован' : 'Верифицирован';
                    const statusClass = isCancelled ? 'status-badge--red' : 'status-badge--green';

                    tr.innerHTML = `
                    <td>${d.fullName || '—'}</td>
                    <td>${d.faculty || '—'}</td>
                    <td><b>${d.diplomNumber}</b></td>
                    <td>${d.year || '—'}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                `;
                    tbody.appendChild(tr);
                });

                // Обновляем счетчики наверху страницы (опционально)
                updateStats(diploms);

            } catch (err) {
                console.error("Ошибка загрузки данных:", err);
            }
        }

        function updateStats(diploms) {
            const stats = document.querySelectorAll('.stats__number');
            if (stats.length >= 3) {
                stats[0].textContent = diploms.length; // Всего
                stats[1].textContent = diploms.filter(d => d.cancelled === 0).length; // Верифицировано
                stats[2].textContent = diploms.filter(d => d.cancelled === 1).length; // Аннулировано
            }
        }

        // ГЛАВНОЕ: Запускаем функции при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            updateUserName();
            loadDiploms();
        });
        document.addEventListener('DOMContentLoaded', () => {
            updateUserName();
            loadDiploms();

            // --- ЛОГИКА ПОИСКА ---
            const searchInput = document.getElementById('searchInput');

            searchInput.addEventListener('input', function() {
                const filter = this.value.toLowerCase(); // Что ввел пользователь
                const rows = document.querySelectorAll('.data-table tbody tr'); // Все строки таблицы

                rows.forEach(row => {
                    // Номер диплома у нас в третьей колонке (индекс 2)
                    const diplomCell = row.getElementsByTagName('td')[2];
                    if (diplomCell) {
                        const textValue = diplomCell.textContent || diplomCell.innerText;

                        // Если номер содержит введенные цифры — показываем строку, иначе скрываем
                        if (textValue.toLowerCase().indexOf(filter) > -1) {
                            row.style.display = "";
                        } else {
                            row.style.display = "none";
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
