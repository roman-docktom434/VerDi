<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/login.css" />
    <script src="js/login.js"></script>
    <title>Вход в аккаунт</title>
  </head>

  <body>
    <h1 id="ComName">ВерДи</h1>

    <div class="container">
      <!-- Левая часть -->
      <div id="left">
        <img src="img/r&l_image.svg" alt="" />
      </div>

      <!-- Правая часть -->
      <div id="right">
        <h2>Добро пожаловать!</h2>
        <p>Войдите в аккаунт</p>

        <div class="tabs">
          <button class="tab active" onclick="switchTab(0)">ВУЗ</button>
          <button class="tab" onclick="switchTab(1)">Студент</button>
          <button class="tab" onclick="switchTab(2)">Работодатель</button>
        </div>

        <!-- Вкладка "ВУЗ" -->
        <div class="form active">
          <input type="text" placeholder="Введите название или код ВУЗа" />
          <input type="password" placeholder="Введите пароль" />
        </div>

        <!-- Вкладка "Студент" -->
        <div class="form">
          <input type="text" placeholder="Введите ФИО" />
          <input type="number" placeholder="Введите номер диплома" />
          <input type="number" placeholder="Введите код ВУЗа" />
        </div>

        <!-- Вкладка "Работодатель" -->
        <div class="form">
          <input type="text" placeholder="Введите e-mail или название организации" />
          <input type="password" placeholder="Введите пароль" />
        </div>

        <button class="btn">Войти в аккаунт</button>

        <div class="login">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
      </div>
    </div>
  </body>
</html>
