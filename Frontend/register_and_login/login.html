<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css" />
    <title>Вход в аккаунт — ВерДи</title>
</head>

<body>
<h1 id="ComName">ВерДи</h1>

<div class="container">
    <div id="left">
        <img src="img/r&l_image.svg" alt="Illustration" />
    </div>

    <div id="right">
        <h2>Добро пожаловать!</h2>
        <p>Войдите в аккаунт</p>

        <div class="tabs">
            <button type="button" class="tab active" onclick="switchTab(0)" data-role="university">ВУЗ</button>
            <button type="button" class="tab" onclick="switchTab(1)" data-role="student">Студент</button>
            <button type="button" class="tab" onclick="switchTab(2)" data-role="employer">Работодатель</button>
        </div>

        <form id="loginForm">
            <div class="form-content active">
                <input type="text" id="hsCode" name="hsCode" placeholder="Введите код ВУЗа" required />
                <input type="password" id="vuzPassword" name="password" placeholder="Введите пароль" required />
            </div>

            <div class="form-content">
                <input type="text" id="diplomCode" name="diplomCode" placeholder="Введите номер диплома" required />
                <input type="password" id="studentPassword" name="password" placeholder="Введите пароль" required />
            </div>

            <div class="form-content">
                <input type="email" id="email" name="email" placeholder="Введите ваш e-mail" required />
                <input type="password" id="employerPassword" name="password" placeholder="Введите пароль" required />
            </div>

            <button type="submit" class="btn">Войти в аккаунт</button>
        </form>

        <div class="login">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
